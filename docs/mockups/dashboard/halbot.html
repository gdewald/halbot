<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>halbot</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#1a1a2e;overflow:hidden}
body{display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.09);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.17)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
input[type=range]{accent-color:#5865F2}
input[type=checkbox]{accent-color:#5865F2}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

// ── TOKENS ────────────────────────────────────────────────────
const T={
  bg:'#0c0c0f', surface:'#111115', panel:'#16161b', raised:'#1c1c22',
  border:'rgba(255,255,255,0.065)', border2:'rgba(255,255,255,0.11)',
  text:'#e2e2ef', sub:'rgba(226,226,239,0.55)', dim:'rgba(226,226,239,0.3)',
  blurple:'#5865F2', blurpleD:'#4752c4', blurpleL:'#7289da',
  green:'#23d18b', red:'#f04747', yellow:'#faa61a', cyan:'#4fc3f7',
};

// ── LOG GENERATOR ─────────────────────────────────────────────
const LEVELS=['DEBUG','INFO','WARN','ERROR'];
const SOURCES=['gateway','commands','events','api','voice','tts','llm','cache'];
const LOG_MSG={
  DEBUG:['Heartbeat ACK received','Cache miss for guild','Resolved shard 0 payload','LLM context window: 4096 tokens','TTS chunk queued (128ms)','Voice buffer flushed'],
  INFO: ['Bot ready — server connected','Command /ping registered','User joined voice channel','LLM response: 342ms','TTS render complete: kokoro','Voice session started','Sound backed up: airhorn.mp3','Wake word detected — joining voice','Playing sound: bruh.mp3'],
  WARN: [`Rate limit hit: retry in 1.2s`,'Unknown opcode 12 received','Slow LLM response: 4.8s','Voice idle timeout approaching','TTS fallback to espeak'],
  ERROR:['LLM connection refused: llm_url unreachable','Voice session dropped: timeout','TTS engine kokoro exited with code 1','WebSocket closed: 4004'],
};
let _lid=0;
function mkLog(lvl){
  const l=lvl||LEVELS[Math.floor(Math.random()*4)];
  const src=SOURCES[Math.floor(Math.random()*SOURCES.length)];
  const msgs=LOG_MSG[l]; const msg=msgs[Math.floor(Math.random()*msgs.length)];
  const now=new Date();
  const ts=now.toTimeString().slice(0,8)+'.'+String(now.getMilliseconds()).padStart(3,'0');
  return{id:++_lid,ts,level:l,source:src,message:msg};
}
const SEED=Array.from({length:80},(_,i)=>{
  const l=i%22===21?'ERROR':i%8===7?'WARN':i%5===4?'DEBUG':'INFO';
  return mkLog(l);
});

// ── LEVEL COLORS ─────────────────────────────────────────────
const LC={DEBUG:T.dim,INFO:T.cyan,WARN:T.yellow,ERROR:T.red};
const LB={DEBUG:'rgba(255,255,255,0.04)',INFO:'rgba(79,195,247,0.1)',WARN:'rgba(250,166,26,0.1)',ERROR:'rgba(240,71,71,0.1)'};
const LBD={DEBUG:'rgba(255,255,255,0.08)',INFO:'rgba(79,195,247,0.18)',WARN:'rgba(250,166,26,0.18)',ERROR:'rgba(240,71,71,0.18)'};

function LevelPill({level}){
  return <span style={{fontFamily:'JetBrains Mono',fontSize:9,fontWeight:600,
    color:LC[level],background:LB[level],border:`1px solid ${LC[level]}28`,
    borderRadius:3,padding:'1px 5px',letterSpacing:'0.06em',whiteSpace:'nowrap'}}>{level}</span>;
}

// ── WINDOWS TITLE BAR ─────────────────────────────────────────
function WinTitleBar({title,subtitle}){
  return(
    <div style={{height:32,flexShrink:0,background:T.surface,borderBottom:`1px solid ${T.border}`,
      display:'flex',alignItems:'center',paddingLeft:12,paddingRight:0,userSelect:'none',
      WebkitAppRegion:'drag'}}>
      <div style={{width:16,height:16,borderRadius:4,
        background:`linear-gradient(135deg,${T.blurple},${T.blurpleL})`,
        display:'flex',alignItems:'center',justifyContent:'center',
        fontSize:9,fontWeight:700,color:'#fff',marginRight:8,flexShrink:0}}>H</div>
      <span style={{fontSize:12,fontWeight:600,color:T.text,marginRight:6}}>{title}</span>
      {subtitle&&<span style={{fontSize:10,color:T.dim,fontFamily:'JetBrains Mono'}}>{subtitle}</span>}
      <div style={{flex:1}}/>
      {/* Windows chrome buttons */}
      {[{label:'─',hov:'rgba(255,255,255,0.08)'},{label:'□',hov:'rgba(255,255,255,0.08)'},{label:'✕',hov:'#c42b1c'}].map((b,i)=>(
        <button key={i} style={{width:46,height:32,border:'none',background:'transparent',
          color:T.sub,fontSize:i===2?12:11,cursor:'pointer',display:'flex',
          alignItems:'center',justifyContent:'center',transition:'background 0.1s',
          WebkitAppRegion:'no-drag'}}
          onMouseEnter={e=>e.currentTarget.style.background=b.hov}
          onMouseLeave={e=>e.currentTarget.style.background='transparent'}
        >{b.label}</button>
      ))}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// LAYOUT VARIANT A — Narrow icon sidebar
// ══════════════════════════════════════════════════════════════
const NAV_ITEMS=[
  {id:'logs',label:'Logs',icon:(a)=><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="3" width="12" height="1.6" rx=".8" fill={a?T.blurple:T.sub}/><rect x="2" y="7.2" width="8.5" height="1.6" rx=".8" fill={a?T.blurple:T.sub}/><rect x="2" y="11.4" width="10.5" height="1.6" rx=".8" fill={a?T.blurple:T.sub}/></svg>},
  {id:'daemon',label:'Daemon',icon:(a)=><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="5.5" stroke={a?T.blurple:T.sub} strokeWidth="1.5"/><circle cx="8" cy="8" r="2" fill={a?T.blurple:T.sub}/><line x1="8" y1="2.5" x2="8" y2="4.5" stroke={a?T.blurple:T.sub} strokeWidth="1.5" strokeLinecap="round"/><line x1="8" y1="11.5" x2="8" y2="13.5" stroke={a?T.blurple:T.sub} strokeWidth="1.5" strokeLinecap="round"/><line x1="2.5" y1="8" x2="4.5" y2="8" stroke={a?T.blurple:T.sub} strokeWidth="1.5" strokeLinecap="round"/><line x1="11.5" y1="8" x2="13.5" y2="8" stroke={a?T.blurple:T.sub} strokeWidth="1.5" strokeLinecap="round"/></svg>},
  {id:'config',label:'Config',icon:(a)=><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2a6 6 0 100 12A6 6 0 008 2z" stroke={a?T.blurple:T.sub} strokeWidth="1.4"/><path d="M8 5.5v5M5.5 8h5" stroke={a?T.blurple:T.sub} strokeWidth="1.4" strokeLinecap="round"/></svg>},
  {id:'stats',label:'Stats',icon:(a)=><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="9" width="3" height="5" rx=".8" fill={a?T.blurple:T.sub}/><rect x="6.5" y="5.5" width="3" height="8.5" rx=".8" fill={a?T.blurple:T.sub}/><rect x="11" y="2" width="3" height="12" rx=".8" fill={a?T.blurple:T.sub}/></svg>},
];

function SidebarNarrow({active,onChange}){
  return(
    <div style={{width:52,height:'100%',background:T.surface,borderRight:`1px solid ${T.border}`,
      display:'flex',flexDirection:'column',alignItems:'center',paddingTop:10,gap:2,flexShrink:0}}>
      {NAV_ITEMS.map(n=>{
        const a=active===n.id;
        return(
          <button key={n.id} onClick={()=>onChange(n.id)} title={n.label} style={{
            width:40,height:40,borderRadius:8,border:'none',cursor:'pointer',
            background:a?`${T.blurple}1a`:'transparent',
            display:'flex',alignItems:'center',justifyContent:'center',
            position:'relative',transition:'background 0.12s',
          }}>
            {n.icon(a)}
            {a&&<div style={{position:'absolute',left:0,top:'50%',transform:'translateY(-50%)',
              width:2.5,height:18,borderRadius:'0 2px 2px 0',background:T.blurple}}/>}
          </button>
        );
      })}
    </div>
  );
}

// LAYOUT VARIANT B — Wide sidebar with labels
function SidebarWide({active,onChange}){
  return(
    <div style={{width:160,height:'100%',background:T.surface,borderRight:`1px solid ${T.border}`,
      flexShrink:0,display:'flex',flexDirection:'column',padding:'8px 8px'}}>
      <div style={{marginBottom:16,padding:'4px 8px',display:'flex',alignItems:'center',gap:8}}>
        <div style={{width:22,height:22,borderRadius:5,background:`linear-gradient(135deg,${T.blurple},${T.blurpleL})`,
          display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700,color:'#fff'}}>H</div>
        <span style={{fontSize:12,fontWeight:600,color:T.text}}>halbot</span>
      </div>
      <div style={{fontSize:9,fontWeight:600,color:T.dim,letterSpacing:'0.1em',
        textTransform:'uppercase',padding:'0 8px',marginBottom:4}}>Navigation</div>
      {NAV_ITEMS.map(n=>{
        const a=active===n.id;
        return(
          <button key={n.id} onClick={()=>onChange(n.id)} style={{
            display:'flex',alignItems:'center',gap:9,
            height:34,padding:'0 10px',borderRadius:7,border:'none',cursor:'pointer',
            background:a?`${T.blurple}1a`:'transparent',
            color:a?T.blurple:T.sub,fontSize:13,fontWeight:a?600:400,
            transition:'all 0.12s',textAlign:'left',position:'relative',width:'100%',
          }}>
            {n.icon(a)}
            {n.label}
            {a&&<div style={{position:'absolute',left:0,top:'50%',transform:'translateY(-50%)',
              width:2.5,height:18,borderRadius:'0 2px 2px 0',background:T.blurple}}/>}
          </button>
        );
      })}
    </div>
  );
}

// LAYOUT VARIANT C — Top tab bar (no sidebar)
function TopTabBar({active,onChange}){
  return(
    <div style={{height:40,flexShrink:0,background:T.surface,borderBottom:`1px solid ${T.border}`,
      display:'flex',alignItems:'center',paddingLeft:12,gap:2}}>
      {NAV_ITEMS.map(n=>{
        const a=active===n.id;
        return(
          <button key={n.id} onClick={()=>onChange(n.id)} style={{
            display:'flex',alignItems:'center',gap:7,
            height:32,padding:'0 14px',borderRadius:6,border:'none',cursor:'pointer',
            background:a?`${T.blurple}1a`:'transparent',
            color:a?T.blurple:T.sub,fontSize:12,fontWeight:a?600:400,
            transition:'all 0.12s',position:'relative',
          }}>
            {n.icon(a)}{n.label}
            {a&&<div style={{position:'absolute',bottom:0,left:'50%',transform:'translateX(-50%)',
              width:24,height:2,borderRadius:'2px 2px 0 0',background:T.blurple}}/>}
          </button>
        );
      })}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// LOGS PANEL
// ══════════════════════════════════════════════════════════════
function LogsPanel({logs}){
  const [filter,setFilter]=useState('ALL');
  const [search,setSearch]=useState('');
  const [autoScroll,setAutoScroll]=useState(true);
  const [wrap,setWrap]=useState(false);
  const scrollRef=useRef(null);

  const visible=useMemo(()=>logs.filter(l=>{
    if(filter!=='ALL'&&l.level!==filter)return false;
    if(search){const q=search.toLowerCase();return l.message.toLowerCase().includes(q)||l.source.includes(q);}
    return true;
  }),[logs,filter,search]);

  useEffect(()=>{
    if(autoScroll&&scrollRef.current)
      scrollRef.current.scrollTop=scrollRef.current.scrollHeight;
  },[visible.length,autoScroll]);

  const counts=useMemo(()=>{
    const c={ALL:logs.length};
    ['DEBUG','INFO','WARN','ERROR'].forEach(l=>{c[l]=logs.filter(x=>x.level===l).length;});
    return c;
  },[logs]);

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden',animation:'fadeIn 0.15s ease'}}>
      {/* toolbar */}
      <div style={{display:'flex',alignItems:'center',gap:6,padding:'8px 12px',
        borderBottom:`1px solid ${T.border}`,flexShrink:0,flexWrap:'wrap',rowGap:6}}>
        {/* level filters */}
        <div style={{display:'flex',gap:2}}>
          {['ALL','DEBUG','INFO','WARN','ERROR'].map(f=>{
            const a=filter===f;
            return(
              <button key={f} onClick={()=>setFilter(f)} style={{
                height:26,padding:'0 9px',borderRadius:5,border:`1px solid ${a?(f==='ALL'?T.blurple:LC[f]):T.border}`,
                background:a?(f==='ALL'?`${T.blurple}22`:LBD[f]):'transparent',
                color:a?(f==='ALL'?T.blurple:LC[f]):T.dim,
                fontSize:10,fontWeight:600,cursor:'pointer',fontFamily:'JetBrains Mono',
                display:'flex',alignItems:'center',gap:4,transition:'all 0.1s',
              }}>
                {f}
                <span style={{fontSize:9,opacity:0.65,background:'rgba(255,255,255,0.08)',
                  borderRadius:3,padding:'0 3px'}}>{counts[f]}</span>
              </button>
            );
          })}
        </div>
        <div style={{flex:1}}/>
        {/* search */}
        <div style={{display:'flex',alignItems:'center',gap:6,background:T.panel,
          border:`1px solid ${search?T.blurple:T.border2}`,borderRadius:5,
          padding:'0 9px',height:26,transition:'border-color 0.15s'}}>
          <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
            <circle cx="5" cy="5" r="3.5" stroke={T.sub} strokeWidth="1.3"/>
            <path d="M8 8l2.5 2.5" stroke={T.sub} strokeWidth="1.3" strokeLinecap="round"/>
          </svg>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="grep…"
            style={{background:'none',border:'none',outline:'none',color:T.text,
              fontSize:11,width:120,fontFamily:'JetBrains Mono'}}/>
          {search&&<button onClick={()=>setSearch('')} style={{background:'none',border:'none',
            color:T.dim,cursor:'pointer',fontSize:11,padding:0}}>✕</button>}
        </div>
        {/* wrap */}
        <ToggleBtn active={wrap} onClick={()=>setWrap(w=>!w)} label="wrap"/>
        {/* autoscroll */}
        <ToggleBtn active={autoScroll} onClick={()=>setAutoScroll(a=>!a)} label="tail" accent={T.green}/>
        {/* clear */}
        <button style={{height:26,padding:'0 9px',borderRadius:5,border:`1px solid ${T.border}`,
          background:'transparent',color:T.dim,fontSize:10,cursor:'pointer',fontFamily:'DM Sans'}}>clear</button>
      </div>

      {/* log output */}
      <div ref={scrollRef} style={{flex:1,overflow:'auto',fontFamily:'JetBrains Mono',fontSize:11.5,lineHeight:1.5}}>
        {visible.map((log,i)=>(
          <LogRow key={log.id} log={log} even={i%2===0} wrap={wrap}/>
        ))}
        <div style={{height:12}}/>
      </div>

      {/* status bar */}
      <div style={{height:22,flexShrink:0,borderTop:`1px solid ${T.border}`,
        background:T.surface,display:'flex',alignItems:'center',padding:'0 12px',gap:16}}>
        <span style={{fontSize:10,color:T.dim,fontFamily:'JetBrains Mono'}}>
          {visible.length} lines{search?` matching "${search}"`:''}</span>
        <div style={{flex:1}}/>
        <span style={{fontSize:10,color:T.dim,fontFamily:'JetBrains Mono'}}>
          {logs.filter(l=>l.level==='ERROR').length} errors · {logs.filter(l=>l.level==='WARN').length} warnings</span>
      </div>
    </div>
  );
}

function LogRow({log,even,wrap}){
  const [hov,setHov]=useState(false);
  const errLine=log.level==='ERROR'; const warnLine=log.level==='WARN';
  return(
    <div onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{display:'flex',alignItems:'baseline',gap:8,
        padding:'1.5px 12px',
        background:hov?'rgba(255,255,255,0.032)':(even?'transparent':'rgba(255,255,255,0.012)'),
        borderLeft:`2px solid ${errLine?`${T.red}50`:warnLine?`${T.yellow}35`:'transparent'}`,
      }}>
      <span style={{color:T.dim,fontSize:9.5,flexShrink:0,minWidth:84}}>{log.ts}</span>
      <LevelPill level={log.level}/>
      <span style={{color:`${T.blurple}bb`,fontSize:10,flexShrink:0,minWidth:58}}>{log.source}</span>
      <span style={{
        color:errLine?T.red:warnLine?T.yellow:T.text,
        whiteSpace:wrap?'pre-wrap':'nowrap',
        overflow:wrap?'visible':'hidden',
        textOverflow:wrap?'clip':'ellipsis',
        flex:1,minWidth:0,
      }}>{log.message}</span>
    </div>
  );
}

function ToggleBtn({active,onClick,label,accent}){
  const ac=accent||T.blurple;
  return(
    <button onClick={onClick} style={{
      height:26,padding:'0 9px',borderRadius:5,
      border:`1px solid ${active?ac:T.border}`,
      background:active?`${ac}18`:'transparent',
      color:active?ac:T.dim,fontSize:10,cursor:'pointer',
      fontFamily:'DM Sans',fontWeight:500,transition:'all 0.1s',
      display:'flex',alignItems:'center',gap:5,
    }}><span style={{fontSize:8}}>●</span>{label}</button>
  );
}

// ══════════════════════════════════════════════════════════════
// DAEMON PANEL
// ══════════════════════════════════════════════════════════════
function DaemonPanel(){
  const [running,setRunning]=useState(true);
  const [uptime,setUptime]=useState(14473);
  const [loading,setLoading]=useState(false);
  const [autoRestart,setAutoRestart]=useState(true);
  const [history]=useState([
    {time:'09:14:02',event:'Started',type:'ok'},
    {time:'09:13:58',event:'Stopped (manual)',type:'warn'},
    {time:'07:22:11',event:'Crashed — SIGTERM',type:'err'},
    {time:'07:20:00',event:'Started',type:'ok'},
    {time:'06:01:33',event:'Crashed — LLM timeout',type:'err'},
  ]);

  useEffect(()=>{
    if(!running)return;
    const t=setInterval(()=>setUptime(u=>u+1),1000);
    return()=>clearInterval(t);
  },[running]);

  const fmt=s=>{
    const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;
    return`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;
  };

  const doAction=act=>{
    setLoading(true);
    setTimeout(()=>{
      if(act==='stop')setRunning(false);
      else if(act==='start')setRunning(true);
      else if(act==='restart'){setRunning(false);setTimeout(()=>setRunning(true),500);}
      setLoading(false);
    },700);
  };

  return(
    <div style={{padding:20,display:'flex',flexDirection:'column',gap:16,overflow:'auto',height:'100%',animation:'fadeIn 0.15s ease'}}>

      {/* Status card */}
      <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,padding:18,
        display:'flex',alignItems:'center',gap:16}}>
        <div style={{position:'relative'}}>
          <div style={{width:52,height:52,borderRadius:12,
            background:running?`${T.green}12`:`${T.red}12`,
            border:`1px solid ${running?T.green:T.red}28`,
            display:'flex',alignItems:'center',justifyContent:'center'}}>
            {loading
              ?<div style={{width:18,height:18,border:`2px solid rgba(255,255,255,0.15)`,
                  borderTopColor:T.blurple,borderRadius:'50%',animation:'spin 0.7s linear infinite'}}/>
              :<svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                {running
                  ?<><circle cx="10" cy="10" r="8" stroke={T.green} strokeWidth="1.5"/>
                     <rect x="7.5" y="7.5" width="1.8" height="5" rx=".9" fill={T.green}/>
                     <rect x="10.7" y="7.5" width="1.8" height="5" rx=".9" fill={T.green}/></>
                  :<><circle cx="10" cy="10" r="8" stroke={T.red} strokeWidth="1.5"/>
                     <polygon points="8.5,7 14,10 8.5,13" fill={T.red}/></>
                }
              </svg>
            }
          </div>
          <div style={{position:'absolute',top:-2,right:-2,width:11,height:11,borderRadius:'50%',
            background:running?T.green:T.red,border:`2px solid ${T.bg}`,
            animation:running?'pulse 2s ease-in-out infinite':'none'}}/>
        </div>

        <div>
          <div style={{fontSize:16,fontWeight:600,color:T.text,display:'flex',alignItems:'center',gap:8}}>
            halbot daemon
            <span style={{fontSize:10,fontWeight:500,color:running?T.green:T.red,
              background:running?`${T.green}14`:`${T.red}14`,padding:'2px 7px',borderRadius:20,
              border:`1px solid ${running?T.green:T.red}28`}}>{running?'RUNNING':'STOPPED'}</span>
          </div>
          <div style={{fontSize:11,color:T.sub,marginTop:3,fontFamily:'JetBrains Mono'}}>
            headless discord bot service · PID {running?28471:'—'}
          </div>
        </div>

        <div style={{flex:1}}/>

        <div style={{display:'flex',alignItems:'center',gap:8}}>
          {/* Auto-restart toggle */}
          <div style={{display:'flex',alignItems:'center',gap:6,marginRight:8}}>
            <span style={{fontSize:11,color:T.sub}}>auto-restart</span>
            <div onClick={()=>setAutoRestart(a=>!a)} style={{
              width:34,height:18,borderRadius:9,cursor:'pointer',
              background:autoRestart?T.blurple:'rgba(255,255,255,0.12)',
              transition:'background 0.2s',position:'relative',
            }}>
              <div style={{position:'absolute',top:2,left:autoRestart?16:2,

            </div>
          </div>
          {running?<>
            <ActionBtn onClick={()=>doAction('restart')} label="Restart" icon="↺" color={T.yellow} disabled={loading}/>

          </>:
            <ActionBtn onClick={()=>doAction('start')} label="Start" icon="▶" color={T.green} disabled={loading}/>
          }
        </div>
      </div>

      {/* Stats */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:10}}>

            </div>

      {/* Event history */}
      <div>
        <div style={{fontSize:10,color:T.dim,textTransform:'uppercase',letterSpacing:'0.09em',marginBottom:8}}>Event Log</div>
        <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:9,overflow:'hidden'}}>
          {history.map((h,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 14px',
              borderBottom:i<history.length-1?`1px solid ${T.border}`:'none'}}>
              <div style={{width:6,height:6,borderRadius:'50%',flexShrink:0,

              <span style={{fontFamily:'JetBrains Mono',fontSize:10,color:T.dim,minWidth:65}}>{h.time}</span>
              <span style={{fontSize:12,color:h.type==='ok'?T.text:h.type==='err'?T.red:T.yellow}}>{h.event}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function ActionBtn({label,icon,color,onClick,disabled}){
  const [h,setH]=useState(false);
  return(
    <button onClick={onClick} disabled={disabled}
      onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}

}

    ]
  },

    ]
  },
];

function ConfigPanel(){
  const [groups,setGroups]=useState(()=>
    CONFIG_GROUPS.map(g=>({...g,fields:g.fields.map(f=>({...f,draft:f.value,dirty:false}))}))
  );
  const [saved,setSaved]=useState(false);
  const [reverted,setReverted]=useState(false);

  const setField=(gid,key,draft)=>setGroups(gs=>gs.map(g=>g.id!==gid?g:{...g,
    fields:g.fields.map(f=>f.key!==key?f:{...f,draft,dirty:draft!==f.value})}));
  const revertField=(gid,key)=>setGroups(gs=>gs.map(g=>g.id!==gid?g:{...g,
    fields:g.fields.map(f=>f.key!==key?f:{...f,draft:f.value,dirty:false})}));
  const anyDirty=groups.some(g=>g.fields.some(f=>f.dirty));
  const dirtyCount=groups.reduce((n,g)=>n+g.fields.filter(f=>f.dirty).length,0);

  const saveAll=()=>{
    setGroups(gs=>gs.map(g=>({...g,fields:g.fields.map(f=>({...f,value:f.draft,dirty:false}))})));
    setSaved(true); setTimeout(()=>setSaved(false),2000);
  };
  const revertAll=()=>{
    setGroups(gs=>gs.map(g=>({...g,fields:g.fields.map(f=>({...f,draft:f.value,dirty:false}))})));
    setReverted(true); setTimeout(()=>setReverted(false),1500);
  };

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden',animation:'fadeIn 0.15s ease'}}>
      {/* Toolbar */}
      <div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 14px',
        borderBottom:`1px solid ${T.border}`,flexShrink:0}}>
        <span style={{fontSize:11,color:T.dim}}>
          {dirtyCount===0?'No unsaved changes':`${dirtyCount} unsaved change${dirtyCount!==1?'s':''}`}
        </span>
        <div style={{flex:1}}/>
        <button onClick={revertAll} disabled={!anyDirty} style={{
          height:28,padding:'0 11px',borderRadius:6,border:`1px solid ${T.border2}`,
          background:'transparent',color:anyDirty?T.sub:T.dim,
          fontSize:11,cursor:anyDirty?'pointer':'default',fontFamily:'DM Sans',
        }}>{reverted?'✓ Reverted':'Revert all'}</button>
        <button onClick={saveAll} disabled={!anyDirty} style={{
          height:28,padding:'0 13px',borderRadius:6,border:'none',
          background:anyDirty?T.blurple:'rgba(255,255,255,0.08)',
          color:anyDirty?'#fff':T.dim,fontSize:11,fontWeight:600,
          cursor:anyDirty?'pointer':'default',fontFamily:'DM Sans',
          transition:'all 0.15s',
        }}>{saved?'✓ Saved':'Save to disk'}</button>
      </div>

      {/* Groups */}
      <div style={{flex:1,overflow:'auto',padding:'14px'}}>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          {groups.map(g=>(
            <div key={g.id} style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:9,overflow:'hidden'}}>
              <div style={{padding:'10px 14px',borderBottom:`1px solid ${T.border}`,
                display:'flex',alignItems:'center',gap:8}}>
                <span style={{fontSize:11,fontWeight:600,color:T.text,textTransform:'uppercase',
                  letterSpacing:'0.06em'}}>{g.label}</span>
                {g.fields.some(f=>f.dirty)&&<span style={{fontSize:9,color:T.blurple,
                  background:`${T.blurple}18`,border:`1px solid ${T.blurple}30`,
                  borderRadius:3,padding:'1px 5px',fontFamily:'JetBrains Mono',fontWeight:600}}>MODIFIED</span>}
              </div>
              <div style={{display:'flex',flexDirection:'column'}}>
                {g.fields.map((f,fi)=>(
                  <ConfigRow key={f.key} field={f} isLast={fi===g.fields.length-1}
                    onChange={v=>setField(g.id,f.key,v)}
                    onRevert={()=>revertField(g.id,f.key)}/>
                ))}
              </div>
            </div>
          ))}
        </div>
        <div style={{height:16}}/>
      </div>
    </div>
  );
}

function ConfigRow({field:f,isLast,onChange,onRevert}){
  const [hov,setHov]=useState(false);
  return(
    <div onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{display:'grid',gridTemplateColumns:'200px 1fr auto',
        alignItems:'center',gap:0,
        borderBottom:isLast?'none':`1px solid ${T.border}`,
        background:f.dirty?`${T.blurple}06`:hov?'rgba(255,255,255,0.018)':'transparent',
        transition:'background 0.1s'}}>
      {/* Key */}
      <div style={{padding:'10px 14px',borderRight:`1px solid ${T.border}`}}>
        <div style={{fontFamily:'JetBrains Mono',fontSize:11,color:T.cyan,display:'flex',alignItems:'center',gap:5}}>
          {f.dirty&&<span style={{color:T.blurple,fontSize:8}}>●</span>}
          {f.label}
        </div>
        <div style={{fontSize:10,color:T.dim,marginTop:2}}>{f.desc}</div>
      </div>
      {/* Value */}
      <div style={{padding:'8px 14px'}}>
        <FieldInput field={f} onChange={onChange}/>
      </div>
      {/* Revert */}
      <div style={{padding:'0 10px',display:'flex',alignItems:'center'}}>
        {f.dirty&&(
          <button onClick={onRevert} title="revert" style={{
            width:24,height:24,borderRadius:5,border:`1px solid ${T.border2}`,
            background:'transparent',color:T.yellow,fontSize:13,cursor:'pointer',
            display:'flex',alignItems:'center',justifyContent:'center',
          }}>↺</button>
        )}
      </div>
    </div>
  );
}

function FieldInput({field:f,onChange}){
  const base={background:T.panel,border:`1px solid ${T.border2}`,borderRadius:6,
    color:T.text,fontSize:12,outline:'none',fontFamily:'JetBrains Mono',
    transition:'border-color 0.15s'};
  const onFocus=e=>e.target.style.borderColor=T.blurple;
  const onBlur=e=>e.target.style.borderColor='rgba(255,255,255,0.11)';

  if(f.type==='bool'){
    const val=f.draft==='true';
    return(
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <div onClick={()=>onChange(val?'false':'true')} style={{
          width:34,height:18,borderRadius:9,cursor:'pointer',
          background:val?T.blurple:'rgba(255,255,255,0.12)',
          transition:'background 0.2s',position:'relative',flexShrink:0}}>
          <div style={{position:'absolute',top:2,left:val?16:2,width:14,height:14,
            borderRadius:'50%',background:'#fff',transition:'left 0.2s',
            boxShadow:'0 1px 3px rgba(0,0,0,0.4)'}}/>
        </div>
        <span style={{fontSize:12,color:val?T.green:T.dim}}>{val?'enabled':'disabled'}</span>
      </div>
    );
  }
  if(f.type==='select'){
    return(
      <select value={f.draft} onChange={e=>onChange(e.target.value)} onFocus={onFocus} onBlur={onBlur}
        style={{...base,padding:'5px 8px',height:30,cursor:'pointer'}}>
        {f.options.map(o=><option key={o}>{o}</option>)}
      </select>
    );
  }
  if(f.type==='range'){
    return(
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <input type="range" min={f.min} max={f.max} step={f.step} value={f.draft}
          onChange={e=>onChange(e.target.value)}
          style={{flex:1,accentColor:T.blurple,height:4}}/>
        <span style={{fontFamily:'JetBrains Mono',fontSize:12,color:T.text,minWidth:36}}>{parseFloat(f.draft).toFixed(2)}×</span>
      </div>
    );
  }
  return(
    <input value={f.draft} onChange={e=>onChange(e.target.value)}
      onFocus={onFocus} onBlur={onBlur}
      style={{...base,padding:'5px 9px',height:30,width:'100%',maxWidth:360}}/>
  );
}

      <SectionHeader label="Text-to-Speech (TTS)" icon="🗣"/>
      <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr) repeat(2,1fr)',gap:10,marginBottom:18}}>
        <LatencyCard label="First audio chunk" avg={128} p95={290} unit="ms" color={T.yellow} sub="time to first playable chunk"/>
        <LatencyCard label="Full render time"  avg={340} p95={680} unit="ms" color={T.yellow} sub="complete synthesis time"/>
        <StatCard label="Renders today"     value="42"    sub="TTS invocations"           accent={T.yellow}/>
        <StatCard label="Fallback to espeak" value="3"   unit="today" sub="kokoro failures" accent={T.red}/>
      </div>

      {/* ── LLM ───────────────────────────────────── */}
      <SectionHeader label="Text LLM" icon="🧠"/>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:10}}>
        <LatencyCard label="Response latency" avg={1240} p95={4800} unit="ms" color={T.blurple} sub="full completion time"/>
        <LatencyCard label="Time to first token" avg={320} p95={890} unit="ms" color={T.blurple} sub="TTFT — key for streaming"/>
        <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:9,padding:'12px 14px',position:'relative',overflow:'hidden'}}>
          <div style={{position:'absolute',top:0,left:0,right:0,height:2,background:`linear-gradient(90deg,${T.green},${T.green}44)`}}/>
          <div style={{fontSize:9,color:T.dim,textTransform:'uppercase',letterSpacing:'0.09em',marginBottom:4}}>Throughput</div>
          <div style={{display:'flex',alignItems:'baseline',gap:6}}>
            <span style={{fontSize:22,fontWeight:600,color:T.text,fontFamily:'JetBrains Mono'}}>38</span>
            <span style={{fontSize:11,color:T.sub}}>tok/s</span>
          </div>
          <div style={{fontSize:9,color:T.dim,marginTop:5}}>avg generation speed</div>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:20}}>
        <StatCard label="Requests today"    value="52"    sub="LLM completions"            accent={T.blurple}/>
        <StatCard label="Avg tokens out"    value="184"   sub="per completion"             accent={T.blurple}/>
        <StatCard label="Context usage"     value="62"    unit="%" sub="avg window fill"   accent={T.yellow}/>
        <StatCard label="Timeouts today"    value="2"     sub="of 52 requests (3.8%)"      accent={T.red}/>
      </div>

      <div style={{height:8}}/>
    </div>
  );
}

function SectionHeader({label,icon}){
  return(
    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
      <span style={{fontSize:14}}>{icon}</span>
      <span style={{fontSize:11,fontWeight:600,color:T.text,textTransform:'uppercase',letterSpacing:'0.07em'}}>{label}</span>
      <div style={{flex:1,height:1,background:T.border,marginLeft:4}}/>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// STATUS BAR (bottom)
// ══════════════════════════════════════════════════════════════
function StatusBar({panel}){
  const [time,setTime]=useState(new Date());
  useEffect(()=>{const t=setInterval(()=>setTime(new Date()),1000);return()=>clearInterval(t);},[]);
  return(
    <div style={{height:22,flexShrink:0,background:T.blurple,
      display:'flex',alignItems:'center',padding:'0 10px',gap:12}}>
      <div style={{display:'flex',alignItems:'center',gap:5}}>
        <div style={{width:6,height:6,borderRadius:'50%',background:'rgba(255,255,255,0.7)',animation:'pulse 2s ease-in-out infinite'}}/>
        <span style={{fontSize:10,color:'rgba(255,255,255,0.85)',fontFamily:'JetBrains Mono'}}>connected</span>
      </div>
      <span style={{fontSize:10,color:'rgba(255,255,255,0.5)'}}>|</span>
      <span style={{fontSize:10,color:'rgba(255,255,255,0.75)',fontFamily:'JetBrains Mono'}}>halbot v0.4.2-dev</span>
      <div style={{flex:1}}/>
      <span style={{fontSize:10,color:'rgba(255,255,255,0.65)',fontFamily:'JetBrains Mono'}}>
        {time.toTimeString().slice(0,8)}
      </span>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// TWEAKS PANEL
// ══════════════════════════════════════════════════════════════
const TWEAK_DEFAULTS=/*EDITMODE-BEGIN*/{
  "layout": "wide",
  "accent": "#5865F2",
  "density": "normal"
}/*EDITMODE-END*/;

function TweaksPanel({tweaks,setTweaks,visible}){
  if(!visible)return null;
  const post=v=>window.parent.postMessage({type:'__edit_mode_set_keys',edits:v},'*');
  const set=(k,v)=>{ const next={...tweaks,[k]:v}; setTweaks(next); post(next); };
  return(
    <div style={{position:'absolute',bottom:30,right:12,width:200,
      background:T.raised,border:`1px solid ${T.border2}`,
      borderRadius:10,padding:14,zIndex:200,
      boxShadow:'0 8px 32px rgba(0,0,0,0.6)',animation:'fadeIn 0.15s ease'}}>
      <div style={{fontSize:11,fontWeight:600,color:T.text,marginBottom:12}}>Tweaks</div>
      <Field label="Layout">
        <select value={tweaks.layout} onChange={e=>set('layout',e.target.value)}
          style={{background:T.panel,border:`1px solid ${T.border2}`,borderRadius:4,
            color:T.text,fontSize:11,padding:'3px 6px',width:'100%',fontFamily:'DM Sans'}}>
          <option value="narrow">Narrow sidebar</option>
          <option value="wide">Wide sidebar</option>
          <option value="tabs">Top tabs</option>
        </select>
      </Field>
      <Field label="Accent">
        <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
          {[['#5865F2','Blurple'],['#23d18b','Green'],['#4fc3f7','Cyan'],['#faa61a','Amber'],['#f04747','Red']].map(([c,n])=>(
            <div key={c} onClick={()=>set('accent',c)} title={n} style={{
              width:18,height:18,borderRadius:'50%',background:c,cursor:'pointer',
              border:`2px solid ${tweaks.accent===c?'#fff':'transparent'}`,
              boxSizing:'border-box',transition:'border 0.1s',
            }}/>
          ))}
        </div>
      </Field>
      <Field label="Density">
        <select value={tweaks.density} onChange={e=>set('density',e.target.value)}
          style={{background:T.panel,border:`1px solid ${T.border2}`,borderRadius:4,
            color:T.text,fontSize:11,padding:'3px 6px',width:'100%',fontFamily:'DM Sans'}}>
          <option value="compact">Compact</option>
          <option value="normal">Normal</option>
          <option value="comfortable">Comfortable</option>
        </select>
      </Field>
    </div>
  );
}

function Field({label,children}){
  return(
    <div style={{marginBottom:10}}>
      <div style={{fontSize:10,color:T.dim,marginBottom:4}}>{label}</div>
      {children}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// APP
// ══════════════════════════════════════════════════════════════
function App(){
  const [panel,setPanel]=useState(()=>localStorage.getItem('halbot_panel')||'logs');
  const [logs,setLogs]=useState(SEED);
  const [tweaks,setTweaks]=useState(TWEAK_DEFAULTS);
  const [tweaksVisible,setTweaksVisible]=useState(false);

  useEffect(()=>{ localStorage.setItem('halbot_panel',panel); },[panel]);

  // Live log tailing
  useEffect(()=>{
    const t=setInterval(()=>{
      setLogs(l=>[...l,mkLog()].slice(-600));
    },1400+Math.random()*1200);
    return()=>clearInterval(t);
  },[]);

  // Tweaks bridge
  useEffect(()=>{
    const h=e=>{
      if(e.data?.type==='__activate_edit_mode')setTweaksVisible(true);
      if(e.data?.type==='__deactivate_edit_mode')setTweaksVisible(false);
    };
    window.addEventListener('message',h);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return()=>window.removeEventListener('message',h);
  },[]);

  const PANEL_SUBTITLE={logs:'Live log stream',daemon:'Service control',config:'Runtime configuration',stats:'Activity & stats'};
  const layout=tweaks.layout||'narrow';

  const mainContent=(
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',minWidth:0}}>
      <WinTitleBar title="halbot" subtitle={`· ${PANEL_SUBTITLE[panel]}`}/>
      {layout==='tabs'&&<TopTabBar active={panel} onChange={setPanel}/>}
      <div style={{flex:1,overflow:'hidden'}}>
        {panel==='logs'  &&<LogsPanel logs={logs}/>}
        {panel==='daemon'&&<DaemonPanel/>}
        {panel==='config'&&<ConfigPanel/>}
        {panel==='stats' &&<StatsPanel/>}
      </div>
      <StatusBar panel={panel}/>
    </div>
  );

  return(
    <div style={{width:'100vw',height:'100vh',display:'flex',alignItems:'center',
      justifyContent:'center',background:'linear-gradient(135deg,#0e0e16 0%,#1a1a2e 100%)'}}>
      <div style={{width:1080,height:680,borderRadius:8,overflow:'hidden',
        background:T.bg,
        boxShadow:'0 0 0 1px rgba(255,255,255,0.07),0 20px 60px rgba(0,0,0,0.8)',
        display:'flex',flexDirection:'column',position:'relative'}}>
        <div style={{flex:1,display:'flex',overflow:'hidden'}}>
          {layout==='narrow'&&<SidebarNarrow active={panel} onChange={setPanel}/>}
          {layout==='wide'  &&<SidebarWide   active={panel} onChange={setPanel}/>}
          {mainContent}
        </div>
        <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} visible={tweaksVisible}/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
