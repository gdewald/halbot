syntax = "proto3";

package halbot.mgmt;

service Mgmt {
  rpc Health (HealthRequest) returns (HealthReply);
  rpc GetConfig (GetConfigRequest) returns (ConfigState);
  rpc UpdateConfig (UpdateConfigRequest) returns (ConfigState);
  rpc PersistConfig (PersistConfigRequest) returns (ConfigState);
  rpc ResetConfig (ResetConfigRequest) returns (ConfigState);
  rpc SetSecret (SetSecretRequest) returns (StatusReply);
  rpc RestartDiscord (Empty) returns (StatusReply);
  rpc LeaveVoice (Empty) returns (StatusReply);
  rpc LoadWhisper (Empty) returns (StatusReply);
  rpc UnloadWhisper (Empty) returns (StatusReply);
  rpc LoadTTS (Empty) returns (StatusReply);
  rpc UnloadTTS (Empty) returns (StatusReply);
  rpc StreamLogs (StreamLogsRequest) returns (stream LogLine);
  rpc GetStats (Empty) returns (StatsReply);
}

enum ConfigSource {
  CONFIG_SOURCE_UNSPECIFIED = 0;
  CONFIG_SOURCE_DEFAULT = 1;
  CONFIG_SOURCE_REGISTRY = 2;
  CONFIG_SOURCE_RUNTIME_OVERRIDE = 3;
}

enum ConfigFieldType {
  CONFIG_FIELD_TYPE_UNSPECIFIED = 0;
  CONFIG_FIELD_TYPE_STRING = 1;
  CONFIG_FIELD_TYPE_NUMBER = 2;
  CONFIG_FIELD_TYPE_BOOL = 3;
  CONFIG_FIELD_TYPE_SELECT = 4;
  CONFIG_FIELD_TYPE_URL = 5;
  CONFIG_FIELD_TYPE_RANGE = 6;
}

enum DiscordState {
  DISCORD_STATE_UNKNOWN = 0;
  DISCORD_STATE_DISCONNECTED = 1;
  DISCORD_STATE_CONNECTING = 2;
  DISCORD_STATE_CONNECTED = 3;
  DISCORD_STATE_RECONNECTING = 4;
  DISCORD_STATE_RATE_LIMITED = 5;
  DISCORD_STATE_TOKEN_INVALID = 6;
  DISCORD_STATE_NO_TOKEN = 7;
}

message Empty {}

message HealthRequest {}

message VoiceInChannel {
  uint64 guild_id = 1;
  uint64 channel_id = 2;
}

message VoiceState {
  oneof kind {
    bool idle = 1;
    VoiceInChannel in_channel = 2;
  }
}

message HealthReply {
  double uptime_seconds = 1;
  string daemon_version = 2;
  DiscordState discord = 3;
  bool llm_reachable = 4;
  VoiceState voice = 5;
  bool whisper_loaded = 6;
  bool tts_loaded = 7;
}

message StringValue {
  string value = 1;
  ConfigSource source = 2;
  ConfigFieldType type = 3;
  repeated string options = 4;
  string description = 5;
  string group = 6;          // "general" | "llm" | "voice" | "tts"
  double min = 7;
  double max = 8;
  double step = 9;
  string label = 10;         // display label, e.g. "LOG_LEVEL"
}

message ConfigState {
  map<string, StringValue> fields = 1;
}

message GetConfigRequest {}

message UpdateConfigRequest {
  // Field name -> new string value. Sets runtime override.
  map<string, string> updates = 1;
}

message PersistConfigRequest {
  // Field names to persist to registry. Empty = persist all currently-overridden.
  repeated string fields = 1;
}

message ResetConfigRequest {
  // Field names whose runtime override is dropped. Empty = reset all.
  repeated string fields = 1;
}

message SetSecretRequest {
  string name = 1;   // e.g. "DISCORD_TOKEN"
  string value = 2;  // plaintext; daemon encrypts via DPAPI
}

message StatusReply {
  bool ok = 1;
  string message = 2;
}

message StreamLogsRequest {
  int32 backlog = 1;         // lines to replay on connect; 0 = none
  string min_level = 2;      // DEBUG|INFO|WARNING|ERROR; empty = all
}

message LogLine {
  int64 ts_unix_nanos = 1;
  string level = 2;
  string source = 3;
  string message = 4;
}

message SoundboardStats {
  int32 sounds_backed_up = 1;
  int64 storage_bytes = 2;
  int64 last_sync_unix = 3;
  int32 new_since_last = 4;
}

message VoicePlaybackStats {
  int32 played_today = 1;
  int32 played_all_time = 2;
  int64 session_seconds_today = 3;
  int32 avg_response_ms = 4;
}

message WakeWordStats {
  int32 detections_today = 1;
  int32 detections_all_time = 2;
  int32 false_positives_today = 3;
  int32 avg_join_latency_ms = 4;
}

message LatencyStats {
  int32 avg_ms = 1;
  int32 p95_ms = 2;
  int32 count_today = 3;
}

message LlmStats {
  int32 response_avg_ms = 1;
  int32 response_p95_ms = 2;
  int32 ttft_avg_ms = 3;
  int32 ttft_p95_ms = 4;
  int32 tokens_per_sec = 5;
  int32 requests_today = 6;
  int32 avg_tokens_out = 7;
  int32 context_usage_pct = 8;
  int32 timeouts_today = 9;
}

message StatsReply {
  SoundboardStats soundboard = 1;
  VoicePlaybackStats voice_playback = 2;
  WakeWordStats wake_word = 3;
  LatencyStats stt = 4;
  LatencyStats tts = 5;
  LlmStats llm = 6;
  bool mock = 99;            // true until real telemetry lands
}
