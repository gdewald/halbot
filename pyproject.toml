[project]
name = "halbot"
version = "0.5.0"
description = "Discord soundboard management bot — daemon + tray skeleton"
requires-python = ">=3.12"
dependencies = []

[project.scripts]
halbot-daemon = "halbot.daemon:main"
halbot-tray = "tray.tray:main"

[dependency-groups]
daemon = [
    "grpcio>=1.60",
    "grpcio-tools>=1.60",
    "protobuf>=4.25",
    "pywin32>=306",
]
tray = [
    "grpcio>=1.60",
    "protobuf>=4.25",
    "pystray>=0.19",
    "pillow>=10",
    "pywin32>=306",
]
build = [
    "pyinstaller>=6.3",
]
dev = []

[tool.uv]
default-groups = ["daemon", "tray", "build"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["halbot", "tray"]
