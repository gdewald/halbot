[project]
name = "halbot"
version = "0.4.0"
description = "Discord soundboard management bot powered by a local LLM"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "discord.py[voice]>=2.5,<3",
    "python-dotenv>=1.0",
    "requests>=2.31",
    "tinytag>=2.0",
    "pydub>=0.25",
    "numpy>=1.24",
    "nvidia-cublas-cu12>=12.9.2.10",
]

[project.optional-dependencies]
voice = [
    "discord-ext-voice-recv>=0.4",
    "faster-whisper>=1.0",
]
tray = [
    "pystray>=0.19",
    "pillow>=10",
]

[dependency-groups]
dev = []
